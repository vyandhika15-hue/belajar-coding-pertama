<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #f0f8ff; /* Mengubah warna latar belakang jadi biru muda */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Mengubah jenis font */
            text-align: center; /* Membuat semua teks berada di tengah */
            padding-top: 50px;
        }
        h1 {
            color: #2c3e50; /* Mengubah warna judul jadi biru tua */
            font-size: 40px;
        }
        p {
            color: #7f8c8d; /* Mengubah warna teks isi jadi abu-abu */
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>Halo Dunia!</h1>
    <p>Ini adalah website pertama saya yang dihias dengan CSS.</p>

</body>
</html>
